<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI - Personal Intelligence Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #525252; }
        
        @keyframes typing-dot {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        .typing-dot {
            animation: typing-dot 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message-animate { animation: fadeIn 0.3s ease-out; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#171717',
                        border: '#262626',
                        accent: '#3b82f6',
                        text: '#ededed',
                        muted: '#a1a1aa'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg text-text h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-surface border-r border-border w-64 flex-shrink-0 flex flex-col transition-transform duration-300 absolute md:relative h-full z-20 transform -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-border flex items-center justify-between">
            <h1 class="font-semibold text-lg tracking-tight">NEXUS AI</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-muted hover:text-white">✕</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4">
            <div class="mb-6">
                <h2 class="text-xs font-medium text-muted uppercase tracking-wider mb-3">Chat History</h2>
                <div id="chatHistory" class="space-y-2">
                </div>
            </div>
            
            <div class="mb-6">
                <h2 class="text-xs font-medium text-muted uppercase tracking-wider mb-3">Settings</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-sm text-muted block mb-2">Provider</label>
                        <select id="providerSelect" class="w-full bg-bg border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-accent">
                            <option value="groq">Groq</option>
                            <option value="openrouter">OpenRouter</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-sm text-muted block mb-2">Model</label>
                        <select id="modelSelect" class="w-full bg-bg border border-border rounded-md px-3 py-2 text-sm focus:outline-none focus:border-accent">
                            <option value="llama3-8b-8192">Llama 3 8B</option>
                            <option value="llama3-70b-8192">Llama 3 70B</option>
                            <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                            <option value="gemma2-9b-it">Gemma 2 9B</option>
                        </select>
                    </div>
                    <button onclick="clearChat()" class="w-full flex items-center justify-center gap-2 px-3 py-2 text-sm text-red-400 hover:bg-red-400/10 rounded-md transition-colors">
                        <span>🗑️</span> Clear Chat
                    </button>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative w-full">
        <!-- Mobile Header -->
        <header class="md:hidden h-14 border-b border-border flex items-center justify-between px-4 bg-surface">
            <button onclick="toggleSidebar()" class="text-muted hover:text-white">☰</button>
            <span class="font-medium">NEXUS</span>
            <div class="w-6"></div>
        </header>

        <!-- Chat Area -->
        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8">
            <!-- Welcome Screen -->
            <div id="welcomeScreen" class="h-full flex flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-accent/10 rounded-2xl flex items-center justify-center mb-6">
                    <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
                <h2 class="text-2xl font-semibold mb-2">Welcome to NEXUS AI</h2>
                <p class="text-muted max-w-md mb-8">Your personal intelligence terminal. Start a conversation or generate images with AI.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl w-full">
                    <button onclick="setInput('Explain quantum computing in simple terms')" class="p-4 bg-surface border border-border rounded-lg hover:border-accent/50 transition-colors text-left">
                        <div class="text-sm font-medium mb-1">💡 Explain a concept</div>
                        <div class="text-xs text-muted">Explain quantum computing in simple terms</div>
                    </button>
                    <button onclick="setInput('Write a creative story about a time traveler')" class="p-4 bg-surface border border-border rounded-lg hover:border-accent/50 transition-colors text-left">
                        <div class="text-sm font-medium mb-1">✍️ Creative writing</div>
                        <div class="text-xs text-muted">Write a creative story about a time traveler</div>
                    </button>
                    <button onclick="setInput('Help me debug this code: [paste your code]')" class="p-4 bg-surface border border-border rounded-lg hover:border-accent/50 transition-colors text-left">
                        <div class="text-sm font-medium mb-1">🐛 Code help</div>
                        <div class="text-xs text-muted">Help me debug this code: [paste your code]</div>
                    </button>
                    <button onclick="toggleImageMode()" class="p-4 bg-surface border border-border rounded-lg hover:border-accent/50 transition-colors text-left">
                        <div class="text-sm font-medium mb-1">🎨 Generate image</div>
                        <div class="text-xs text-muted">Switch to image generation mode</div>
                    </button>
                </div>
            </div>

            <!-- Messages List -->
            <div id="messagesList" class="hidden max-w-3xl mx-auto space-y-6 pb-4"></div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-border bg-surface p-4">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-end gap-3">
                    <button id="imageModeBtn" onclick="toggleImageMode()" class="p-3 text-muted hover:text-accent transition-colors" title="Toggle image mode">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                        </svg>
                    </button>
                    <div class="flex-1 relative">
                        <textarea 
                            id="userInput" 
                            placeholder="Message NEXUS AI..." 
                            rows="1"
                            class="w-full bg-bg border border-border rounded-xl px-4 py-3 pr-12 focus:outline-none focus:border-accent resize-none max-h-32"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button 
                            id="sendBtn" 
                            onclick="sendMessage()"
                            class="absolute right-2 bottom-2 p-2 bg-accent hover:bg-blue-600 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-2">
                    <p class="text-xs text-muted">NEXUS AI may produce inaccurate information about people, places, or facts.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isImageMode = false;
        const messagesList = document.getElementById('messagesList');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageModeBtn = document.getElementById('imageModeBtn');

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function setInput(text) {
            userInput.value = text;
            userInput.focus();
            autoResize(userInput);
        }

        function clearChat() {
            messagesList.innerHTML = '';
            messagesList.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
            userInput.value = '';
        }

        function toggleImageMode() {
            isImageMode = !isImageMode;
            imageModeBtn.classList.toggle('text-accent', isImageMode);
            userInput.placeholder = isImageMode ? 'Describe the image you want to generate...' : 'Message NEXUS AI...';
            userInput.focus();
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        function appendMessage(role, content, isImage = false) {
            welcomeScreen.classList.add('hidden');
            messagesList.classList.remove('hidden');

            const div = document.createElement('div');
            div.className = `flex gap-4 message-animate ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const avatar = role === 'user' 
                ? `<div class="w-8 h-8 rounded-sm bg-neutral-700 flex items-center justify-center text-xs">👤</div>`
                : `<div class="w-8 h-8 rounded-sm bg-accent flex items-center justify-center text-xs">✦</div>`;

            if (isImage) {
                div.innerHTML = `
                    ${role === 'assistant' ? avatar : ''}
                    <div class="max-w-md">
                        <img src="${content}" alt="Generated image" class="rounded-lg border border-border max-w-full" />
                    </div>
                    ${role === 'user' ? avatar : ''}
                `;
            } else {
                const bubbleColor = role === 'user' ? 'bg-[#262626]' : 'bg-transparent';
                div.innerHTML = `
                    ${role === 'assistant' ? avatar : ''}
                    <div class="${bubbleColor} rounded-2xl px-4 py-3 max-w-[80%] whitespace-pre-wrap">${content}</div>
                    ${role === 'user' ? avatar : ''}
                `;
            }
            
            messagesList.appendChild(div);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function appendLoading() {
            const div = document.createElement('div');
            div.id = 'loadingIndicator';
            div.className = 'flex gap-4 justify-start message-animate';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-sm bg-accent flex items-center justify-center text-xs">✦</div>
                <div class="flex items-center gap-1 h-8">
                    <div class="w-2 h-2 bg-muted rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-muted rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-muted rounded-full typing-dot"></div>
                </div>
            `;
            messagesList.appendChild(div);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function removeLoading() {
            const loader = document.getElementById('loadingIndicator');
            if (loader) loader.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            appendMessage('user', text);
            appendLoading();

            try {
                let response;
                if (isImageMode) {
                    response = await fetch('/api/imagine', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: text })
                    });
                    
                    const data = await response.json();
                    removeLoading();
                    
                    if (data.url) {
                        appendMessage('assistant', data.url, true);
                    } else {
                        appendMessage('assistant', 'Error generating image: ' + (data.error || 'Unknown error'));
                    }
                } else {
                    const provider = document.getElementById('providerSelect').value;
                    const model = document.getElementById('modelSelect').value;

                    response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            messages: [{ role: 'user', content: text }], 
                            provider, 
                            model
                        })
                    });
                    
                    const data = await response.json();
                    removeLoading();
                    
                    if (data.content) {
                        appendMessage('assistant', data.content);
                    } else {
                        appendMessage('assistant', 'Error: ' + (data.error || 'Failed to get response'));
                    }
                }
            } catch (error) {
                removeLoading();
                appendMessage('assistant', 'Network error: ' + error.message);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
